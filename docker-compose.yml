services:
  next-tech-client:
    container_name: next-tech-client
    restart: always
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URI: http://host.docker.internal:4001
        NEXT_PUBLIC_API_GRAPHQL_URL: http://host.docker.internal:4001/graphql
        NEXT_PUBLIC_API_WS: ws://host.docker.internal:4001
        NEXT_PUBLIC_WS_URL: ws://host.docker.internal:3001
    ports:
      - "4000:3000"
    networks:
      - client-network

networks:
  client-network:
    driver: bridge
